<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما فلوكس | CinemaFlux</title>
    <style>
        :root {
            --bg-main: #0b1116;
            --bg-dark: #06090c;
            --bg-card: #121b22;
            --border-color: #1c252d;
            --primary: #e50914;
            --text-main: #ffffff;
            --text-muted: #9aa6b1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0; padding: 0; padding-bottom: 40px;
        }
        
        /* شريط التحكم العلوي وزر تغيير اللغة */
        .top-bar {
            background-color: var(--bg-dark);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .lang-btn {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .site-logo {
            font-size: 20px; font-weight: bold; color: var(--primary); margin: 0;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 15px; }
        
        /* خانة البحث */
        .search-box { margin: 20px auto; display: flex; justify-content: center; gap: 10px; max-width: 600px; }
        .search-box input {
            flex: 1; padding: 12px 20px; font-size: 15px; border: 1px solid var(--border-color);
            border-radius: 25px; background-color: var(--bg-card); color: #fff; outline: none;
        }
        body[dir="rtl"] .search-box input { text-align: right; }
        body[dir="ltr"] .search-box input { text-align: left; }
        .search-box input:focus { border-color: var(--primary); }
        .search-btn {
            background-color: var(--primary); color: white; border: none;
            padding: 0 25px; font-size: 15px; font-weight: bold; border-radius: 25px; cursor: pointer;
        }

        /* المشغل الرئيسي الافتراضي */
        .main-player {
            background-color: #000; border-radius: 12px; overflow: hidden; margin-bottom: 25px;
            border: 1px solid var(--border-color); display: none;
        }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .player-controls { display: flex; gap: 10px; padding: 10px; background-color: var(--bg-dark); justify-content: center; }
        .server-btn {
            background-color: var(--bg-card); color: #fff; border: 1px solid var(--border-color);
            padding: 8px 16px; font-size: 13px; border-radius: 5px; cursor: pointer;
        }
        .server-btn.active { background-color: var(--primary); border-color: var(--primary); }

        /* ==================== واجهة تفاصيل المسلسل (سينمانا) ==================== */
        .details-view { display: none; margin-bottom: 30px; }
        .hero-details-banner {
            position: relative; width: 100%; height: 260px; border-radius: 12px; overflow: hidden;
            background-size: cover; background-position: center; display: flex; align-items: flex-end;
            border: 1px solid var(--border-color); margin-bottom: 20px;
        }
        .hero-details-overlay {
            padding: 20px; width: 100%; background: linear-gradient(to top, var(--bg-main) 15%, transparent 100%);
        }
        .details-title { font-size: 24px; font-weight: bold; margin: 0 0 8px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }
        .details-meta { display: flex; gap: 10px; font-size: 13px; color: var(--text-muted); margin-bottom: 10px; align-items: center; }
        .details-desc { font-size: 14px; color: #cbd5e1; line-height: 1.6; margin: 0; }
        
        /* تبويب المواسم */
        .seasons-tabs { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; padding-bottom: 5px; }
        .season-tab-btn {
            background-color: transparent; color: var(--text-main); border: 2px solid var(--border-color);
            padding: 6px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap;
        }
        .season-tab-btn.active { background-color: var(--bg-card); border-color: var(--text-main); }

        /* قائمة الحلقات الرأسية (سينمانا) */
        .episodes-list { display: flex; flex-direction: column; gap: 12px; }
        .episode-row {
            display: flex; background-color: var(--bg-dark); border-radius: 8px; overflow: hidden;
            border: 1px solid var(--border-color); cursor: pointer; align-items: center; padding-left: 15px;
        }
        .ep-thumb-wrapper { position: relative; width: 120px; height: 75px; flex-shrink: 0; background-color: #000; }
        .ep-thumb { width: 100%; height: 100%; object-fit: cover; }
        .ep-play-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
        }
        .ep-play-icon { width: 26px; height: 26px; background-color: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 12px; }
        .ep-info { padding: 10px 15px; flex: 1; }
        .ep-title { font-size: 14px; font-weight: bold; margin: 0 0 5px 0; }
        .ep-duration { font-size: 11px; color: var(--text-muted); }

        /* البانر الرئيسي المتحرك */
        .carousel-container { position: relative; width: 100%; height: 220px; border-radius: 12px; overflow: hidden; margin-bottom: 25px; border: 1px solid var(--border-color); }
        .carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.5s ease-in-out; }
        .carousel-slide { min-width: 100%; height: 100%; position: relative; background-size: cover; background-position: center; display: flex; align-items: flex-end; }
        .carousel-content { padding: 20px; width: 100%; background: linear-gradient(to top, var(--bg-main) 20%, transparent 100%); }
        .hero-title { font-size: 22px; font-weight: bold; margin: 0 0 10px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .hero-btn { background-color: var(--primary); color: white; border: none; padding: 8px 20px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; }

        /* صفوف العرض الأفقي */
        .row-header { display: flex; justify-content: space-between; align-items: center; margin: 25px 0 12px 0; }
        .row-title { font-size: 18px; font-weight: bold; color: #fff; border-right: 4px solid var(--primary); padding-right: 8px; }
        body[dir="ltr"] .row-title { border-right: none; border-left: 4px solid var(--primary); padding-right: 0; padding-left: 8px; }
        .movies-slider { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        
        /* كارت الفيلم */
        .movie-card { min-width: 130px; max-width: 130px; cursor: pointer; }
        .poster-wrapper { position: relative; width: 100%; height: 185px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
        .movie-poster { width: 100%; height: 100%; object-fit: cover; }
        .movie-info { padding: 6px 0; }
        .movie-name { font-size: 13px; font-weight: bold; margin: 0 0 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-meta { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
        .imdb-badge { background-color: var(--border-color); color: #fff; padding: 1px 4px; border-radius: 3px; font-weight: bold; font-size: 10px; }

        .no-results {
            display: none; text-align: center; padding: 30px 15px; color: var(--text-muted); font-size: 14px; line-height: 1.6;
            background-color: var(--bg-dark); border-radius: 8px; border: 1px solid var(--border-color); margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">English</button>
        <div class="site-logo" id="logoText">🍿 سينما فلوكس</div>
    </div>

    <div class="container">
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن اسم الفيلم أو المسلسل...">
            <button class="search-btn" id="searchBtn" onclick="searchItems()">بحث</button>
        </div>

        <div class="main-player" id="videoPlayerSection">
            <div class="video-container">
                <iframe id="mainIframe" src="" allowfullscreen="true" scrolling="no"></iframe>
            </div>
            <div class="player-controls">
                <button class="server-btn active" id="btnHD" onclick="changeServer('HD')">سيرفر HD</button>
                <button class="server-btn" id="btnSD" onclick="changeServer('SD')">سيرفر ضعیف</button>
            </div>
        </div>

        <div class="details-view" id="detailsView">
            <div class="hero-details-banner" id="detailsBanner">
                <div class="hero-details-overlay">
                    <h1 class="details-title" id="detTitle">اسم العمل</h1>
                    <div class="details-meta" id="detMeta"></div>
                    <p class="details-desc" id="detDesc">الوصف والقصة...</p>
                </div>
            </div>
            
            <div class="seasons-tabs" id="seasonsTabs"></div>
            
            <div id="detailsContentSection">
                <div class="row-title" id="contentSectionTitle" style="margin-bottom:15px;">الحلقات</div>
                <div class="episodes-list" id="episodesList"></div>
                <div class="movies-slider" id="suggestionsSlider" style="display:none;"></div>
            </div>
        </div>

        <div class="carousel-container" id="heroCarousel">
            <div class="carousel-track" id="carouselTrack">
                <div class="carousel-slide" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=800');">
                    <div class="carousel-content">
                        <div class="hero-title">Onward مدبلج</div>
                        <button class="hero-btn" onclick="openMovie('Onward مدبلج', 'قصة شقيقين من القزم يشرعان في رحلة استكشافية لمعرفة ما إذا كان لا يزال هناك بعض السحر المتبقي في العالم لقضاء يوم أخير مع والدهما الراحل.', 'https://playmogo.com/e/yuj41p7m9e3e', 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=800', '7.4', 'انيميشن')">شاهد الآن</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="noResultsMessage" class="no-results">عذراً لا توجد نتائج ، قم بأدخال كلمات مختلفة او ربما انت قمت بكتابة الاسم بشكل غير صحيح 🔍</div>

        <div id="moviesBlock">
            <div class="row-header"><div class="row-title" id="headingMovies">قسم الأفلام</div></div>
            <div class="movies-slider">
                <div class="movie-card" data-type="movie" onclick="openMovie('Onward مدبلج', 'قصة شقيقين من القزم يشرعان في رحلة استكشافية لمعرفة ما إذا كان لا يزال هناك بعض السحر المتبقي في العالم لقضاء يوم أخير مع والدهما الراحل.', 'https://playmogo.com/e/yuj41p7m9e3e', 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400', '7.4', 'انيميشن')">
                    <div class="poster-wrapper"><img class="movie-poster" src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400"></div>
                    <div class="movie-info">
                        <p class="movie-name">Onward مدبلج</p>
                        <div class="movie-meta"><span class="imdb-badge">7.4</span><span>انيميشن</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="seriesBlock">
            <div class="row-header"><div class="row-title" id="headingSeries">قسم المسلسلات</div></div>
            <div class="movies-slider">
                <div class="movie-card" data-type="series" onclick="openSeries('House of the Dragon', 'تدور الأحداث قبل 300 عام من أحداث المسلسل الأصلي، حيث سيركز على تفاصيل عائلة آل تارجارين ولمحات هامة في تاريخ العائلة.', 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=800', '8.5', 'أكشن, مغامرة', '2022')">
                    <div class="poster-wrapper"><img class="movie-poster" src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400"></div>
                    <div class="movie-info">
                        <p class="movie-name">House of the Dragon</p>
                        <div class="movie-meta"><span class="imdb-badge">8.5</span><span>أكشن, مغامرة</span></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let currentHD = "", currentSD = "";
        let currentLang = "ar";

        // بيانات الترجمة للواجهة بالكامل
        const translations = {
            ar: {
                logo: "🍿 سينما فلوكس", langBtn: "English", placeholder: "ابحث عن اسم الفيلم أو المسلسل...",
                searchBtn: "بحث", moviesHead: "قسم الأفلام", seriesHead: "قسم المسلسلات",
                episodes: "الحلقات", suggested: "أفلام مقترحة قد تعجبك",
                errorMsg: "عذراً لا توجد نتائج ، قم بأدخال كلمات مختلفة او ربما انت قمت بكتابة الاسم بشكل غير صحيح 🔍"
            },
            en: {
                logo: "🍿 CinemaFlux", langBtn: "العربية", placeholder: "Search movies or series...",
                searchBtn: "Search", moviesHead: "Movies Section", seriesHead: "Series Section",
                episodes: "Episodes", suggested: "Recommended Movies For You",
                errorMsg: "Sorry, no results found. Please enter different words or check your spelling! 🔍"
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === "ar" ? "en" : "ar";
            document.documentElement.lang = currentLang;
            document.body.dir = currentLang === "ar" ? "rtl" : "ltr";
            
            document.getElementById('langBtn').innerText = translations[currentLang].langBtn;
            document.getElementById('logoText').innerText = translations[currentLang].logo;
            document.getElementById('searchInput').placeholder = translations[currentLang].placeholder;
            document.getElementById('searchBtn').innerText = translations[currentLang].searchBtn;
            document.getElementById('headingMovies').innerText = translations[currentLang].moviesHead;
            document.getElementById('headingSeries').innerText = translations[currentLang].seriesHead;
            document.getElementById('noResultsMessage').innerText = translations[currentLang].errorMsg;
            
            const epTitle = document.getElementById('contentSectionTitle');
            if (epTitle.getAttribute('data-type') === 'movie') {
                epTitle.innerText = translations[currentLang].suggested;
            } else {
                epTitle.innerText = translations[currentLang].episodes;
            }
        }

        // تحريك البانر تلقائياً
        let currentSlide = 0;
        setInterval(() => {
            const track = document.getElementById('carouselTrack');
            const slidesCount = document.querySelectorAll('.carousel-slide').length;
            if(slidesCount > 1) {
                currentSlide = (currentSlide + 1) % slidesCount;
                track.style.transform = `translateX(${currentSlide * 100}%)`;
            }
        }, 5000);

        // ==================== دوال التحكم بالتشغيل والعرض المتطور ====================
        function openMovie(title, desc, url, poster, rating, genre) {
            document.getElementById('detailsView').style.display = "block";
            document.getElementById('detTitle').innerText = title;
            document.getElementById('detDesc').innerText = desc;
            document.getElementById('detailsBanner').style.backgroundImage = `linear-gradient(to top, var(--bg-main) 15%, transparent 100%), url('${poster}')`;
            document.getElementById('detMeta').innerHTML = `<span class="imdb-badge">${rating}</span> <span>${genre}</span>`;
            
            document.getElementById('seasonsTabs').innerHTML = ""; 
            document.getElementById('episodesList').style.display = "none";
            document.getElementById('suggestionsSlider').style.display = "flex";
            
            const contentTitle = document.getElementById('contentSectionTitle');
            contentTitle.setAttribute('data-type', 'movie');
            contentTitle.innerText = translations[currentLang].suggested;

            // توليد أفلام مقترحة افتراضية
            document.getElementById('suggestionsSlider').innerHTML = `
                <div class="movie-card" onclick="playVideo('${title}', '${desc}', '${url}', '${url}')">
                    <div class="poster-wrapper"><img class="movie-poster" src="${poster}"></div>
                    <div class="movie-info"><p class="movie-name">${title}</p></div>
                </div>
            `;
            playVideo(title, desc, url, url);
        }

        function openSeries(title, desc, poster, rating, genre, year) {
            document.getElementById('detailsView').style.display = "block";
            document.getElementById('detTitle').innerText = title;
            document.getElementById('detDesc').innerText = desc;
            document.getElementById('detailsBanner').style.backgroundImage = `linear-gradient(to top, var(--bg-main) 15%, transparent 100%), url('${poster}')`;
            document.getElementById('detMeta').innerHTML = `<span class="imdb-badge">${rating}</span> <span>${genre}</span> <span>${year}</span>`;
            
            document.getElementById('suggestionsSlider').style.display = "none";
            document.getElementById('episodesList').style.display = "flex";
            
            const contentTitle = document.getElementById('contentSectionTitle');
            contentTitle.setAttribute('data-type', 'series');
            contentTitle.innerText = translations[currentLang].episodes;

            // إضافة تبويبات المواسم (الموسم 1 والموسم 2 كمثال مطابق للتصميم)
            const seasonsTabs = document.getElementById('seasonsTabs');
            seasonsTabs.innerHTML = `
                <button class="season-tab-btn active" onclick="loadEpisodes(1, '${title}', '${poster}')">الموسم 1</button>
                <button class="season-tab-btn" onclick="loadEpisodes(2, '${title}', '${poster}')">الموسم 2</button>
            `;
            
            loadEpisodes(1, title, poster);
        }

        // تحميل قائمة الحلقات رأسياً مثل "سينمانا" عند الضغط على الموسم
        function loadEpisodes(seasonNum, seriesTitle, poster) {
            const tabBtns = document.querySelectorAll('.season-tab-btn');
            tabBtns.forEach((btn, idx) => {
                btn.classList.toggle('active', idx === (seasonNum - 1));
            });

            const epList = document.getElementById('episodesList');
            epList.innerHTML = "";

            // مثال لحلقتين جاهزتين للعمل
            const sampleEpisodes = [
                { epNum: 1, title: `الموسم ${seasonNum} الحلقة 1`, url: "https://playmogo.com/e/yuj41p7m9e3e", duration: "59 دقيقة" },
                { epNum: 2, title: `الموسم ${seasonNum} الحلقة 2`, url: "https://playmogo.com/e/yuj41p7m9e3e", duration: "55 دقيقة" }
            ];

            sampleEpisodes.forEach(ep => {
                epList.innerHTML += `
                    <div class="episode-row" onclick="playVideo('${seriesTitle}
