    <script>
        // الرابط الجديد والمباشر المربوط بنشر الشيت الخاص بك (يدعم التحديث الفوري من الهاتف)
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4dzSrtQ9iL0zQJ40cG0g1_AyVM7VC3oKQ1VdIhd_LdLKoDm5fFrOF6kLqM_FR1NrrO6EIbQlNE-1a/pub?output=csv`;

        let globalMoviesData = [];
        let currentLang = 'ar';
        let currentHD = "", currentSD = "", currentSub = "";
        let watchHistory = JSON.parse(localStorage.getItem('cinemaFluxHistory')) || [];

        const langData = {
            ar: {
                logo: "🎬 سينما فلوكس | CinemaFlux", homeBtn: "الرئيسية | HOME", searchPlaceholder: "ابحث عن اسم الفيلم أو المسلسل...", searchBtn: "بحث",
                historyTitle: "سجل المشاهدة مؤخراً", clearHistory: "حذف السجل بالكامل 🗑️", hdServer: "سيرفر عالي الجودة",
                sdServer: "سيرفر إنترنت ضعيف", castBtn: "📺 بث للشاشة", seasonsLabel: "المواسم المتوفرة:",
                moviesSection: "قسم الأفلام", seriesSection: "قسم المسلسلات", watchNow: "🎬 شاهد الآن",
                noResults: "عذراً لا توجد نتائج ، قم بأدخل كلمات مختلفة او ربما انت قمت بكتابة الاسم بشكل غير صحيح 🔍"
            },
            en: {
                logo: "🎬 CinemaFlux", homeBtn: "HOME", searchPlaceholder: "Search for movie or series name...", searchBtn: "Search",
                historyTitle: "Recently Watched", clearHistory: "Clear Full History 🗑️", hdServer: "High Quality Server",
                sdServer: "Low Internet Server", castBtn: "📺 Cast to TV", seasonsLabel: "Available Seasons:",
                moviesSection: "Movies Section", seriesSection: "Series Section", watchNow: "🎬 Watch Now",
                noResults: "Sorry, no results found. Please enter different words or check your spelling! 🔍"
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            fetchDataFromSheets();
            updateHistoryUI();
        });

        function fetchDataFromSheets() {
            fetch(SHEET_URL)
                .then(res => res.text())
                .then(data => {
                    // دالة ذكية لتقسيم أسطر الـ CSV المنشور وقراءتها كمصفوفات برمجية
                    const lines = data.split('\n').map(line => {
                        return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
                    });

                    const moviesSlider = document.getElementById('moviesSlider');
                    const seriesSlider = document.getElementById('seriesSlider');
                    const carouselTrack = document.getElementById('carouselTrack');
                    const heroCarousel = document.getElementById('heroCarousel');

                    if(lines.length <= 1) return;

                    let hasMovies = false;
                    let hasSeries = false;

                    // تفريغ الأقسام قبل البناء لمنع تكرار العناصر عند التحديث
                    if(moviesSlider) moviesSlider.innerHTML = "";
                    if(seriesSlider) seriesSlider.innerHTML = "";
                    if(carouselTrack) carouselTrack.innerHTML = "";
                    globalMoviesData = []; // إعادة تصفير البيانات المحلية

                    lines.forEach((row, index) => {
                        if (index === 0 || !row[0]) return; // تخطي سطر العناوين والأسطر الفارغة
                        
                        const title = row[0] || '';
                        const desc = row[1] || '';
                        const poster = row[2] || 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400';
                        const videoHD = row[3] || '';
                        const videoSD = row[4] || '';
                        const subtitle = row[5] || '';
                        const rating = row[6] || '7.5';
                        const genre = row[7] || 'عام';
                        const type = (row[8] || 'movie').toLowerCase().trim();

                        const itemIndex = globalMoviesData.length;
                        globalMoviesData.push({ title, desc, videoHD, videoSD, subtitle, type });

                        const cardHTML = `
                            <div class="movie-card" data-type="${type}" onclick="openSheetItem(${itemIndex})">
                                <div class="poster-wrapper"><img class="movie-poster" src="${poster}"></div>
                                <div class="movie-info">
                                    <p class="movie-name">${title}</p>
                                    <div class="movie-meta"><span class="imdb-badge">${rating}</span><span>${genre}</span></div>
                                </div>
                            </div>
                        `;

                        if (type === 'movie' || type === 'فيلم') {
                            if(moviesSlider) moviesSlider.insertAdjacentHTML('beforeend', cardHTML);
                            hasMovies = true;
                        } else {
                            if(seriesSlider) seriesSlider.insertAdjacentHTML('beforeend', cardHTML);
                            hasSeries = true;
                        }

                        // بناء السلايدر العلوي (أول 3 عناصر في الشيت)
                        if (index <= 3 && carouselTrack) {
                            const slideHTML = `
                                <div class="carousel-slide" style="background-image: url('${poster}');">
                                    <div class="carousel-content">
                                        <div class="hero-title">${title}</div>
                                        <button class="hero-btn" onclick="openSheetItem(${itemIndex})">🎬 شاهد الآن</button>
                                    </div>
                                </div>
                            `;
                            carouselTrack.insertAdjacentHTML('beforeend', slideHTML);
                            if(heroCarousel) heroCarousel.style.display = "block";
                        }
                    });

                    if(hasMovies) document.getElementById('moviesBlock').style.display = "block";
                    if(hasSeries) document.getElementById('seriesBlock').style.display = "block";
                })
                .catch(err => console.error("Error loading CSV data: ", err));
        }

        function openSheetItem(index) {
            const item = globalMoviesData[index];
            if(!item) return;

            document.getElementById('videoPlayerSection').style.display = "block";
            document.getElementById('currentTitle').innerText = item.title;
            document.getElementById('currentDesc').innerText = item.desc;
            
            currentHD = item.videoHD; 
            currentSD = item.videoSD; 
            currentSub = item.subtitle;

            if (item.type === 'movie' || item.type === 'فيلم') {
                document.getElementById('seasonsArea').style.display = "none";
                document.getElementById('episodesArea').style.display = "none";
                playVideoSource(item.videoHD, item.subtitle);
            } else {
                document.getElementById('seasonsArea').style.display = "block";
                document.getElementById('episodesArea').style.display = "flex";
                setupDynamicSeries(item);
            }

            addToHistory(item.title, index, item.type);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function setupDynamicSeries(item) {
            const tabsContainer = document.getElementById('seasonsTabs');
            const episodesArea = document.getElementById('episodesArea');
            if(!tabsContainer || !episodesArea) return;

            tabsContainer.innerHTML = `<button class="season-tab active">الموسم 1</button>`;
            episodesArea.innerHTML = `
                <div class="episode-row active" onclick="playVideoSource('${item.videoHD}', '${item.subtitle}')">
                    <div class="episode-info">
                        <div class="episode-title">الحلقة الإفتتاحية / كامل العرض</div>
                        <div class="episode-meta-text">سيرفر أساسي متوفر من الجدول</div>
                    </div>
                    <div class="episode-play-icon">▶</div>
                </div>
            `;
            playVideoSource(item.videoHD, item.subtitle);
        }

        function playVideoSource(url, subUrl) {
            const container = document.getElementById('mediaContainer');
            if(!container) return;
            
            if (url.includes('.mp4') || url.includes('drive.google') || (subUrl && subUrl !== '')) {
                container.innerHTML = `
                    <video id="mainVideoPlayer" controls width="100%" height="100%" style="background:#000;">
                        <source src="${url}" type="video/mp4">
                        ${subUrl ? `<track src="${subUrl}" kind="subtitles" srclang="ar" label="العربية" default>` : ''}
                    </video>
                `;
            } else {
                container.innerHTML = `<iframe id="mainIframe" src="${url}" allowfullscreen="true" scrolling="no"></iframe>`;
            }
        }

        function goHome() {
            const playerSection = document.getElementById('videoPlayerSection');
            if (playerSection) playerSection.style.display = "none";
            const container = document.getElementById('mediaContainer');
            if(container) container.innerHTML = ""; 
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        let currentSlide = 0;
        setInterval(() => {
            const slides = document.querySelectorAll('.carousel-slide');
            const track = document.getElementById('carouselTrack');
            if(slides.length > 0 && track) {
                currentSlide = (currentSlide + 1) % slides.length;
                track.style.transform = `translateX(${currentLang === 'ar' ? (currentSlide * 100) : -(currentSlide * 100)}%)`;
            }
        }, 4500);

        function setLanguage(lang) {
            currentLang = lang;
            const html = document.getElementById('mainHtml');
            
            if (currentLang === 'ar') {
                html.setAttribute('dir', 'rtl'); html.setAttribute('lang', 'ar');
                document.getElementById('btnAr').classList.add('active');
                document.getElementById('btnEn').classList.remove('active');
            } else {
                html.setAttribute('dir', 'ltr'); html.setAttribute('lang', 'en');
                document.getElementById('btnEn').classList.add('active');
                document.getElementById('btnAr').classList.remove('active');
            }

            document.getElementById('txtLogo').innerText = langData[currentLang].logo;
            document.getElementById('txtHomeBtn').innerText = langData[currentLang].homeBtn;
            document.getElementById('searchInput').placeholder = langData[currentLang].searchPlaceholder;
            document.getElementById('btnSearchSubmit').innerText = langData[currentLang].searchBtn;
            document.getElementById('txtHistoryTitle').innerText = langData[currentLang].historyTitle;
            document.getElementById('txtClearHistory').innerText = langData[currentLang].clearHistory;
            document.getElementById('btnHD').innerText = langData[currentLang].hdServer;
            document.getElementById('btnSD').innerText = langData[currentLang].sdServer;
            document.getElementById('btnCast').innerText = langData[currentLang].castBtn;
            document.getElementById('txtSeasonsLabel').innerText = langData[currentLang].seasonsLabel;
            document.getElementById('txtMoviesSection').innerText = langData[currentLang].moviesSection;
            document.getElementById('txtSeriesSection').innerText = langData[currentLang].seriesSection;
            document.getElementById('noResultsMessage').innerText = langData[currentLang].noResults;
            
            if(document.getElementById('carouselTrack')) document.getElementById('carouselTrack').style.transform = `translateX(0%)`;
            currentSlide = 0;
            updateHistoryUI();
        }

        function changeServer(type) {
            const videoElement = document.getElementById('mainVideoPlayer');
            const iframeElement = document.getElementById('mainIframe');
            const targetUrl = (type === 'HD') ? currentHD : currentSD;

            if (type === 'HD') {
                document.getElementById('btnHD').classList.add('active');
                document.getElementById('btnSD').classList.remove('active');
            } else {
                document.getElementById('btnSD').classList.add('active');
                document.getElementById('btnHD').classList.remove('active');
            }

            if(videoElement) {
                videoElement.src = targetUrl; videoElement.load(); videoElement.play();
            } else if(iframeElement) {
                iframeElement.src = targetUrl;
            }
        }

        function castToTV() {
            alert(currentLang === 'ar' ? "يرجى ربط هاتفك والشاشة الذكية بنفس شبكة Wi-Fi للبث فوراً!" : "Please connect your device to the Smart TV via the same Wi-Fi network to stream!");
        }

        function addToHistory(title, globalIndex, type) {
            watchHistory = watchHistory.filter(item => item.title !== title);
            watchHistory.unshift({ title, globalIndex, type });
            localStorage.setItem('cinemaFluxHistory', JSON.stringify(watchHistory));
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const listContainer = document.getElementById('historyList');
            const section = document.getElementById('historySection');
            if (!listContainer || watchHistory.length === 0) {
                if(section) section.style.display = "none";
                return;
            }
            if(section) section.style.display = "block";
            listContainer.innerHTML = "";
            watchHistory.forEach((item, index) => {
                listContainer.innerHTML += `
                    <div class="history-item">
                        <span class="delete-item-btn" onclick="deleteHistoryItem(${index}, event)">✕</span>
                        <span onclick="openSheetItem(${item.globalIndex})">${item.title}</span>
                    </div>
                `;
            });
        }

        function deleteHistoryItem(index, event) {
            event.stopPropagation();
            watchHistory.splice(index, 1);
            localStorage.setItem('cinemaFluxHistory', JSON.stringify(watchHistory));
            updateHistoryUI();
        }

        function clearFullHistory() {
            watchHistory = [];
            localStorage.removeItem('cinemaFluxHistory');
            updateHistoryUI();
        }

        function searchItems() {
            let input = document.getElementById('searchInput').value.trim().toLowerCase();
            let cards = document.getElementsByClassName('movie-card');
            let movieFound = false, seriesFound = false;
            
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getElementsByClassName('movie-name')[0].innerText.toLowerCase();
                let type = cards[i].getAttribute('data-type');
                
                if (name.includes(input)) {
                    cards[i].style.display = "";
                    if (type === 'movie' || type === 'فيلم') movieFound = true;
                    else seriesFound = true;
                } else {
                    cards[i].style.display = "none";
                }
            }

            document.getElementById('moviesBlock').style.display = movieFound ? "block" : "none";
            document.getElementById('seriesBlock').style.display = seriesFound ? "block" : "none";
            
            let msg = document.getElementById('noResultsMessage');
            if(msg) msg.style.display = (!movieFound && !seriesFound) ? "block" : "none";
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchItems();
        });
    </script>
