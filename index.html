<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سينما فلوكس | CinemaFlux</title>
    <style>
        /* إعدادات عامة لمنع تمدد الشاشة نهائياً في الهواتف */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            background-color: #0b1116;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            padding-bottom: 40px;
            box-sizing: border-box;
        }
        
        /* الهيدر المطور مع زر الرئيسية واللغات */
        header {
            background-color: #06090c;
            padding: 15px;
            border-bottom: 1px solid #1c252d;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        
        .logo-text {
            font-size: 22px;
            font-weight: bold;
            color: #e50914;
        }

        /* زر الرئيسية */
        .home-btn {
            background-color: #121b22;
            color: #fff;
            border: 1px solid #1c252d;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .home-btn:hover {
            background-color: #e50914;
            border-color: #e50914;
        }

        /* أزرار تبديل اللغة أسفل اللوجو */
        .lang-switcher {
            display: inline-flex;
            background-color: #121b22;
            border: 1px solid #1c252d;
            border-radius: 15px;
            padding: 2px;
            font-size: 11px;
            cursor: pointer;
            width: fit-content;
        }
        html[dir="rtl"] .lang-switcher { align-self: flex-start; }
        html[dir="ltr"] .lang-switcher { align-self: flex-end; }
        
        .lang-btn {
            padding: 4px 12px;
            border-radius: 12px;
            color: #9aa6b1;
            font-weight: bold;
            transition: all 0.2s ease;
            user-select: none;
        }
        .lang-btn.active {
            background-color: #e50914;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 12px;
            box-sizing: border-box;
        }
        
        /* خانة وزر البحث */
        .search-box {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        .search-box input {
            flex: 1;
            padding: 12px 15px;
            font-size: 14px;
            border: 1px solid #1c252d;
            border-radius: 25px;
            background-color: #121b22;
            color: #fff;
            outline: none;
            min-width: 0;
        }
        html[dir="rtl"] .search-box input { text-align: right; }
        html[dir="ltr"] .search-box input { text-align: left; }
        .search-box input:focus { border-color: #e50914; }
        .search-btn {
            background-color: #e50914; color: white; border: none;
            padding: 0 20px; font-size: 14px; font-weight: bold; border-radius: 25px; cursor: pointer;
            white-space: nowrap;
        }

        /* واجهة المشغل والصفحة الداخلية */
        .main-player {
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid #1c252d;
            display: none;
            width: 100%;
            box-sizing: border-box;
        }
        .video-container {
            position: relative; padding-bottom: 56.25%; height: 0; width: 100%;
            background-color: #000;
        }
        .video-container iframe, .video-container video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }
        .player-controls {
            display: flex; gap: 8px; padding: 10px; background-color: #06090c; justify-content: center; flex-wrap: wrap;
        }
        .server-btn, .cast-btn {
            background-color: #121b22; color: #fff; border: 1px solid #1c252d; padding: 8px 14px; font-size: 12px; border-radius: 5px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
        }
        .server-btn.active { background-color: #e50914; border-color: #e50914; }
        .cast-btn { background-color: #28a745; border-color: #28a745; }
        .video-details { padding: 15px; background-color: #06090c; border-top: 1px solid #1c252d; }
        .video-title { font-size: 18px; margin: 0 0 8px 0; font-weight: bold; }
        .video-desc { font-size: 13px; color: #9aa6b1; margin: 0; line-height: 1.6; }

        /* تصفح المواسم للمسلسلات */
        .seasons-container { margin-top: 15px; display: none; padding: 10px 0; border-top: 1px solid #1c252d; }
        .section-subtitle { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #fff; }
        .seasons-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .season-tab {
            background-color: #121b22; border: 1px solid #1c252d; padding: 6px 14px; border-radius: 20px; color: #fff; font-size: 12px; cursor: pointer; white-space: nowrap;
        }
        .season-tab.active { background-color: #e50914; border-color: #e50914; }

        /* قائمة حلقات المسلسلات */
        .episodes-list { display: none; margin-top: 15px; flex-direction: column; gap: 8px; }
        .episode-row {
            display: flex; align-items: center; background-color: #121b22; border: 1px solid #1c252d; border-radius: 8px; padding: 8px; cursor: pointer; gap: 12px; transition: background 0.2s;
        }
        .episode-row:hover, .episode-row.active { background-color: #1c252d; }
        .episode-thumb { width: 90px; height: 55px; border-radius: 4px; object-fit: cover; background-color: #000; }
        .episode-info { flex: 1; min-width: 0; }
        .episode-title { font-size: 13px; font-weight: bold; margin: 0 0 3px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .episode-meta-text { font-size: 11px; color: #9aa6b1; }

        /* البانر العلوي التلقائي */
        .carousel-container {
            position: relative; width: 100%; height: 200px; border-radius: 12px; overflow: hidden; margin-bottom: 25px; border: 1px solid #1c252d;
            display: none; /* سيظهر فقط إذا كان هناك بيانات في الشيت */
        }
        .carousel-track {
            display: flex; width: 100%; height: 100%; transition: transform 0.5s ease-in-out;
        }
        .carousel-slide {
            min-width: 100%; height: 100%; position: relative; background-size: cover; background-position: center; display: flex; align-items: flex-end;
        }
        .carousel-content {
            padding: 15px; width: 100%; background: linear-gradient(to top, #0b1116 20%, transparent 100%);
            box-sizing: border-box;
        }
        .hero-title { font-size: 20px; font-weight: bold; margin: 0 0 10px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .hero-btn {
            background-color: #e50914; color: white; border: none; padding: 8px 18px; font-size: 13px; font-weight: bold; border-radius: 20px; cursor: pointer;
        }

        /* سجل المشاهدة */
        .history-section {
            background-color: #06090c; padding: 12px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #1c252d; display: none;
        }
        .history-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .clear-all-btn {
            background-color: #dc3545; color: #fff; border: none; padding: 4px 10px; font-size: 11px; border-radius: 4px; cursor: pointer;
        }
        .history-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .history-item {
            position: relative; background-color: #121b22; border-radius: 5px; font-size: 12px; white-space: nowrap; border: 1px solid #1c252d; cursor: pointer;
        }
        html[dir="rtl"] .history-item { padding: 8px 32px 8px 12px; }
        html[dir="ltr"] .history-item { padding: 8px 12px 8px 32px; }
        .delete-item-btn {
            position: absolute; top: 50%; transform: translateY(-50%); color: #dc3545; cursor: pointer; font-weight: bold;
        }
        html[dir="rtl"] .delete-item-btn { right: 10px; }
        html[dir="ltr"] .delete-item-btn { left: 10px; }

        /* صفوف العرض الممررة */
        .row-header { display: none; justify-content: space-between; align-items: center; margin: 25px 0 12px 0; }
        .row-title { font-size: 17px; font-weight: bold; color: #fff; padding: 0 8px; }
        html[dir="rtl"] .row-title { border-right: 4px solid #e50914; }
        html[dir="ltr"] .row-title { border-left: 4px solid #e50914; }
        .movies-slider { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; width: 100%; }
        .movies-slider::-webkit-scrollbar { height: 4px; }
        .movies-slider::-webkit-scrollbar-thumb { background-color: #1c252d; border-radius: 10px; }
        
        /* كارت العرض */
        .movie-card { min-width: 120px; max-width: 120px; cursor: pointer; }
        .poster-wrapper { position: relative; width: 100%; height: 170px; border-radius: 8px; overflow: hidden; border: 1px solid #1c252d; }
        .movie-poster { width: 100%; height: 100%; object-fit: cover; }
        .movie-info { padding: 6px 0; }
        .movie-name { font-size: 12px; font-weight: bold; margin: 0 0 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-meta { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #9aa6b1; }
        .imdb-badge { background-color: #1c252d; color: #fff; padding: 1px 4px; border-radius: 3px; font-weight: bold; font-size: 10px; }

        .no-results {
            display: none; text-align: center; padding: 25px 15px; color: #9aa6b1; font-size: 13px; line-height: 1.6; background-color: #06090c; border-radius: 8px; border: 1px solid #1c252d; margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="logo-text" id="txtLogo">🎬 سينما فلوكس | CinemaFlux</div>
            <button class="home-btn" id="txtHomeBtn" onclick="goHome()">الرئيسية | HOME</button>
        </div>
        <div class="lang-switcher">
            <span class="lang-btn active" id="btnAr" onclick="setLanguage('ar')">العربية</span>
            <span class="lang-btn" id="btnEn" onclick="setLanguage('en')">English</span>
        </div>
    </header>

    <div class="container">
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن اسم الفيلم أو المسلسل...">
            <button class="search-btn" id="btnSearchSubmit" onclick="searchItems()">بحث</button>
        </div>

        <div class="history-section" id="historySection">
            <div class="history-header">
                <div class="row-title" style="border-color: #28a745;" id="txtHistoryTitle">سجل المشاهدة مؤخراً</div>
                <button class="clear-all-btn" id="txtClearHistory" onclick="clearFullHistory()">حذف السجل بالكامل 🗑️</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>

        <div class="main-player" id="videoPlayerSection">
            <div class="video-container" id="mediaContainer"></div>
            <div class="player-controls">
                <button class="server-btn active" id="btnHD" onclick="changeServer('HD')">سيرفر عالي الجودة</button>
                <button class="server-btn" id="btnSD" onclick="changeServer('SD')">سيرفر إنترنت ضعيف</button>
                <button class="cast-btn" id="btnCast" onclick="castToTV()">📺 بث للشاشة</button>
            </div>
            
            <div class="video-details">
                <h1 id="currentTitle" class="video-title">-</h1>
                <p id="currentDesc" class="video-desc">-</p>
                
                <div class="seasons-container" id="seasonsArea">
                    <div class="section-subtitle" id="txtSeasonsLabel">المواسم المتوفرة:</div>
                    <div class="seasons-tabs" id="seasonsTabs"></div>
                </div>
                <div class="episodes-list" id="episodesArea"></div>
            </div>
        </div>

        <div class="carousel-container" id="heroCarousel">
            <div class="carousel-track" id="carouselTrack"></div>
        </div>

        <div id="noResultsMessage" class="no-results">عذراً لا توجد نتائج ، قم بأدخل كلمات مختلفة او ربما انت قمت بكتابة الاسم بشكل غير صحيح 🔍</div>

        <div id="moviesBlock" style="display:none;">
            <div class="row-header" id="moviesHeader" style="display:flex;"><div class="row-title" id="txtMoviesSection">قسم الأفلام</div></div>
            <div class="movies-slider" id="moviesSlider"></div>
        </div>

        <div id="seriesBlock" style="display:none;">
            <div class="row-header" id="seriesHeader" style="display:flex;"><div class="row-title" id="txtSeriesSection">قسم المسلسلات</div></div>
            <div class="movies-slider" id="seriesSlider"></div>
        </div>

    </div>

    <script>
        const SHEET_ID = '1owxbbXAUGcQjgwaDFlX4ban5kRU5AGvMFxMfifJa8DI';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;

        // مصفوفة البيانات المستقرة من جوجل شيت لمنع تداخل الاقتباسات
        let globalMoviesData = [];

        const langData = {
            ar: {
                logo: "🎬 سينما فلوكس | CinemaFlux", homeBtn: "الرئيسية | HOME", searchPlaceholder: "ابحث عن اسم الفيلم أو المسلسل...", searchBtn: "بحث",
                historyTitle: "سجل المشاهدة مؤخراً", clearHistory: "حذف السجل بالكامل 🗑️", hdServer: "سيرفر عالي الجودة",
                sdServer: "سيرفر إنترنت ضعيف", castBtn: "📺 بث للشاشة", seasonsLabel: "المواسم المتوفرة:",
                moviesSection: "قسم الأفلام", seriesSection: "قسم المسلسلات", watchNow: "🎬 شاهد الآن",
                noResults: "عذراً لا توجد نتائج ، قم بأدخل كلمات مختلفة او ربما انت قمت بكتابة الاسم بشكل غير صحيح 🔍"
            },
            en: {
                logo: "🎬 CinemaFlux", homeBtn: "HOME", searchPlaceholder: "Search for movie or series name...", searchBtn: "Search",
                historyTitle: "Recently Watched", clearHistory: "Clear Full History 🗑️", hdServer: "High Quality Server",
                sdServer: "Low Internet Server", castBtn: "📺 Cast to TV", seasonsLabel: "Available Seasons:",
                moviesSection: "Movies Section", seriesSection: "Series Section", watchNow: "🎬 Watch Now",
                noResults: "Sorry, no results found. Please enter different words or check your spelling! 🔍"
            }
        };

        let currentLang = 'ar';
        let currentHD = "", currentSD = "", currentSub = "";
        let watchHistory = JSON.parse(localStorage.getItem('cinemaFluxHistory')) || [];

        window.addEventListener('DOMContentLoaded', () => {
            fetchDataFromSheets();
            updateHistoryUI();
        });

        function fetchDataFromSheets() {
            fetch(SHEET_URL)
                .then(res => res.text())
                .then(data => {
                    const temp = data.substring(data.indexOf("(") + 1, data.lastIndexOf(")"));
                    const jsonData = JSON.parse(temp);
                    const rows = jsonData.table.rows;
                    
                    const moviesSlider = document.getElementById('moviesSlider');
                    const seriesSlider = document.getElementById('seriesSlider');
                    const carouselTrack = document.getElementById('carouselTrack');
                    const heroCarousel = document.getElementById('heroCarousel');

                    let hasMovies = false;
                    let hasSeries = false;

                    rows.forEach((row, index) => {
                        if (index === 0) return; // تخطي السطر الأول (العناوين)
                        
                        const title = row.c[0] ? String(row.c[0].v) : '';
                        const desc = row.c[1] ? String(row.c[1].v) : '';
                        const poster = row.c[2] ? String(row.c[2].v) : 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400';
                        const videoHD = row.c[3] ? String(row.c[3].v) : '';
                        const videoSD = row.c[4] ? String(row.c[4].v) : '';
                        const subtitle = row.c[5] ? String(row.c[5].v) : '';
                        const rating = row.c[6] ? String(row.c[6].v) : '7.5';
                        const genre = row.c[7] ? String(row.c[7].v) : 'عام';
                        const type = row.c[8] ? String(row.c[8].v).trim().toLowerCase() : 'movie';

                        if(!title) return;

                        // حفظ آمن داخل المصفوفة
                        const itemIndex = globalMoviesData.length;
                        globalMoviesData.push({ title, desc, videoHD, videoSD, subtitle, type });

                        const cardHTML = `
                            <div class="movie-card" data-type="${type}" onclick="openSheetItem(${itemIndex})">
                                <div class="poster-wrapper"><img class="movie-poster" src="${poster}"></div>
                                <div class="movie-info">
                                    <p class="movie-name">${title}</p>
                                    <div class="movie-meta"><span class="imdb-badge">${rating}</span><span>${genre}</span></div>
                                </div>
                            </div>
                        `;

                        if (type === 'movie' || type === 'فيلم') {
                            if(moviesSlider) moviesSlider.insertAdjacentHTML('beforeend', cardHTML);
                            hasMovies = true;
                        } else {
                            if(seriesSlider) seriesSlider.insertAdjacentHTML('beforeend', cardHTML);
                            hasSeries = true;
                        }

                        // إضافة أول عنصرين تلقائياً إلى البانر المتحرك العلوي
                        if (index <= 2 && carouselTrack) {
                            const slideHTML = `
                                <div class="carousel-slide" style="background-image: url('${poster}');">
                                    <div class="carousel-content">
                                        <div class="hero-title">${title}</div>
                                        <button class="hero-btn" onclick="openSheetItem(${itemIndex})">🎬 شاهد الآن</button>
                                    </div>
                                </div>
                            `;
                            carouselTrack.insertAdjacentHTML('beforeend', slideHTML);
                            if(heroCarousel) heroCarousel.style.display = "block";
                        }
                    });

                    // إظهار أو إخفاء البلوكات حسب وجود البيانات في الشيت
                    if(hasMovies) document.getElementById('moviesBlock').style.display = "block";
                    if(hasSeries) document.getElementById('seriesBlock').style.display = "block";
                })
                .catch(err => console.log("Error loading sheet data: ", err));
        }

        // فتح العناصر ديناميكياً برقم الفهرس بشكل آمن جداً
        function openSheetItem(index
