<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما فلوكس | CinemaFlux</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1116;
            color: #ffffff;
            margin: 0;
            padding: 0;
            padding-bottom: 30px;
        }
        header {
            background-color: #06090c;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #e50914;
            border-bottom: 1px solid #1c252d;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        /* خانة وزر البحث المطور */
        .search-box {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            gap: 10px;
            max-width: 600px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 20px;
            font-size: 15px;
            border: 1px solid #1c252d;
            border-radius: 25px;
            background-color: #121b22;
            color: #fff;
            outline: none;
            text-align: right;
        }
        .search-box input:focus {
            border-color: #e50914;
        }
        .search-btn {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 0 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
        }

        /* المشغل الرئيسي المتطور */
        .main-player {
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid #1c252d;
            display: none; /* يظهر فقط عند تشغيل فيلم */
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }
        .server-buttons {
            display: flex; gap: 10px; padding: 10px; background-color: #06090c; justify-content: center;
        }
        .server-btn {
            background-color: #121b22; color: #fff; border: 1px solid #1c252d; padding: 8px 16px; font-size: 13px; border-radius: 5px; cursor: pointer;
        }
        .server-btn.active { background-color: #e50914; border-color: #e50914; }
        .video-details { padding: 15px; background-color: #06090c; }
        .video-title { font-size: 18px; margin: 0 0 5px 0; }
        .video-desc { font-size: 13px; color: #9aa6b1; margin: 0; line-height: 1.5; }

        /* بنر العرض العلوي الكبير (مثل الصورة) */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 220px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            background-image: linear-gradient(to top, #0b1116 10%, transparent 90%), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=800');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            border: 1px solid #1c252d;
        }
        .hero-content {
            padding: 20px;
            width: 100%;
        }
        .hero-title {
            font-size: 22px;
            font-weight: bold;
            margin: 0 0 10px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .hero-btn {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* أقسام العرض الأفقية المتطورة (التمرير يميناً ويساراً للهواتف) */
        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0 12px 0;
        }
        .row-title {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        .row-more {
            font-size: 13px;
            color: #9aa6b1;
            text-decoration: none;
        }
        .movies-slider {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-behavior: smooth;
        }
        /* إخفاء شريط التمرير الافتراضي لشكل أجمل */
        .movies-slider::-webkit-scrollbar {
            height: 4px;
        }
        .movies-slider::-webkit-scrollbar-thumb {
            background-color: #1c252d;
            border-radius: 10px;
        }
        
        /* كارت الفيلم بتصميم سينمانا */
        .movie-card {
            min-width: 130px;
            max-width: 130px;
            background-color: transparent;
            cursor: pointer;
        }
        .poster-wrapper {
            position: relative;
            width: 100%;
            height: 185px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #1c252d;
        }
        .movie-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .movie-info {
            padding: 6px 0;
        }
        .movie-name {
            font-size: 13px;
            font-weight: bold;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-meta {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #9aa6b1;
        }
        .imdb-badge {
            background-color: #1c252d;
            color: #fff;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 10px;
        }

        .no-results {
            display: none;
            text-align: center;
            padding: 20px;
            color: #9aa6b1;
        }
    </style>
</head>
<body>

    <header>🎬 سينما فلوكس | CinemaFlux</header>

    <div class="container">
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن اسم الفيلم...">
            <button class="search-btn" onclick="searchMovies()">بحث</button>
        </div>

        <div class="main-player" id="videoPlayerSection">
            <div class="video-container">
                <iframe id="mainIframe" src="" allowfullscreen="true" scrolling="no"></iframe>
            </div>
            <div class="server-buttons">
                <button class="server-btn active" id="btnHD" onclick="changeServer('HD')">سيرفر عالي الجودة</button>
                <button class="server-btn" id="btnSD" onclick="changeServer('SD')">سيرفر إنترنت ضعيف</button>
            </div>
            <div class="video-details">
                <h1 id="currentTitle" class="video-title">-</h1>
                <p id="currentDesc" class="video-desc">-</p>
            </div>
        </div>

        <div class="hero-banner" id="heroBanner">
            <div class="hero-content">
                <div class="hero-title">فيلم Onward مدبلج</div>
                <button class="hero-btn" onclick="playMovie('فيلم Onward مدبلج', 'قصة شقيقين من القزم يشرعان في رحلة استكشافية لمعرفة ما إذا كان لا يزال هناك بعض السحر المتبقي في العالم لقضاء يوم أخير مع والدهما الراحل.', 'https://playmogo.com/e/yuj41p7m9e3e', 'https://playmogo.com/e/yuj41p7m9e3e')">🎬 شاهد الآن</button>
            </div>
        </div>

        <div id="noResultsMessage" class="no-results">عذراً، لم نجد أي فيلم بهذا الاسم! 🔍</div>

        <div class="row-header">
            <div class="row-title">أحدث الأفلام المضافة</div>
            <a href="#" class="row-more">المزيد</a>
        </div>
        
        <div class="movies-slider" id="moviesSlider1">
            
            <div class="movie-card" onclick="playMovie('فيلم Onward مدبلج', 'قصة شقيقين من القزم يشرعان في رحلة استكشافية لمعرفة ما إذا كان لا يزال هناك بعض السحر المتبقي في العالم لقضاء يوم أخير مع والدهما الراحل.', 'https://playmogo.com/e/yuj41p7m9e3e', 'https://playmogo.com/e/yuj41p7m9e3e')">
                <div class="poster-wrapper">
                    <img class="movie-poster" src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400" alt="Onward">
                </div>
                <div class="movie-info">
                    <p class="movie-name">Onward مدبلج</p>
                    <div class="movie-meta">
                        <span class="imdb-badge">7.4</span>
                        <span>انيميشن, دبلجة</span>
                    </div>
                </div>
            </div>

            <div class="movie-card" onclick="playMovie('فيلم تجريبي 2', 'هذا وصف للفيلم التجريبي الثاني المضاف للتأكد من ميزة التمرير الأفقي.', 'https://playmogo.com/e/your_second_id', 'https://playmogo.com/e/your_second_id')">
                <div class="poster-wrapper">
                    <img class="movie-poster" src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400" alt="تجريبي">
                </div>
                <div class="movie-info">
                    <p class="movie-name">فيلم تجريبي 2</p>
                    <div class="movie-meta">
                        <span class="imdb-badge">8.0</span>
                        <span>أكشن, إثارة</span>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        let currentHD = "";
        let currentSD = ""; 

        function playMovie(title, desc, hdLink, sdLink) {
            // إظهار قسم المشغل
            document.getElementById('videoPlayerSection').style.display = "block";
            
            document.getElementById('currentTitle').innerText = title;
            document.getElementById('currentDesc').innerText = desc;
            currentHD = hdLink;
            currentSD = sdLink;
            
            document.getElementById('mainIframe').src = hdLink;
            document.getElementById('btnHD').classList.add('active');
            document.getElementById('btnSD').classList.remove('active');
            
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function changeServer(type) {
            if(type === 'HD') {
                document.getElementById('mainIframe').src = currentHD;
                document.getElementById('btnHD').classList.add('active');
                document.getElementById('btnSD').classList.remove('active');
            } else {
                document.getElementById('mainIframe').src = currentSD;
                document.getElementById('btnSD').classList.add('active');
                document.getElementById('btnHD').classList.remove('active');
            }
        }

        function searchMovies() {
            let input = document.getElementById('searchInput').value.trim().toLowerCase();
            let cards = document.getElementsByClassName('movie-card');
            let foundAny = false;
            
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getElementsByClassName('movie-name')[0].innerText.toLowerCase();
                if (name.includes(input)) {
                    cards[i].style.display = "";
                    foundAny = true;
                } else {
                    cards[i].style.display = "none";
                }
            }

            let msg = document.getElementById('noResultsMessage');
            msg.style.display = foundAny ? "none" : "block";
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { searchMovies(); }
        });
    </script>
</body>
</html>
